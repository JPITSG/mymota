[platformio]
description = myMota ESP8266/ESP8285 replacement firmware
default_envs = mymota-esp8266-1m
src_dir = src
build_cache_dir = .cache

[common]
platform = https://github.com/tasmota/platform-espressif8266/releases/download/2026.04.00/platform-espressif8266.zip
platform_packages =
  framework-arduinoespressif8266 @ https://github.com/tasmota/Arduino/releases/download/2.7.8/esp8266-2.7.8.zip
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.f_cpu = 80000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.1m256.ld
build_unflags =
  -Wall
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DNDEBUG
  -DFP_IN_IROM
  -DVTABLES_IN_FLASH
  -DMIMETYPE_MINIMAL
  -DPIO_FRAMEWORK_ARDUINO_ESPRESSIF_SDK22x_190703
  -DPIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH_LOW_FLASH
  -DMYMOTA_VERSION=\"0.1.82\"
  -DHTTP_MAX_DATA_WAIT=250
  -DHTTP_MAX_CLOSE_WAIT=75
  -Wl,-Map,firmware.map
lib_ignore =
  ArduinoOTA
  ESP8266HTTPUpdateServer
  ESP8266LLMNR
  ESP8266NetBIOS
  ESP8266SSDP
  ESP8266WiFiMesh
  GDBStub
  SPISlave
lib_deps =
  bblanchon/ArduinoJson @ 6.21.5

[env:mymota-esp8266-1m]
platform = ${common.platform}
platform_packages = ${common.platform_packages}
framework = ${common.framework}
board = esp01_1m
board_build.f_cpu = ${common.board_build.f_cpu}
board_build.f_flash = ${common.board_build.f_flash}
board_build.flash_mode = ${common.board_build.flash_mode}
board_build.ldscript = ${common.board_build.ldscript}
build_unflags = ${common.build_unflags}
build_flags =
  ${common.build_flags}
  -DMYMOTA_TARGET=\"esp8266-1m\"
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_ignore = ${common.lib_ignore}
lib_deps = ${common.lib_deps}

[env:mymota-esp8285-1m]
platform = ${common.platform}
platform_packages = ${common.platform_packages}
framework = ${common.framework}
board = esp8285
board_build.f_cpu = ${common.board_build.f_cpu}
board_build.f_flash = ${common.board_build.f_flash}
board_build.flash_mode = ${common.board_build.flash_mode}
board_build.ldscript = ${common.board_build.ldscript}
build_unflags = ${common.build_unflags}
build_flags =
  ${common.build_flags}
  -DMYMOTA_TARGET=\"esp8285-1m\"
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_ignore = ${common.lib_ignore}
lib_deps = ${common.lib_deps}
